<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --page-bg: #fff7ef;
            --accent-start: #ff7a18;
            --accent-end: #ffb347;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top right, rgba(255, 122, 24, 0.18), transparent 30%),
                radial-gradient(circle at bottom left, rgba(255, 179, 71, 0.22), transparent 32%),
                linear-gradient(180deg, #fffdfa 0%, var(--page-bg) 100%);
        }

        .register-card {
            border: 0;
            border-radius: 1.5rem;
            box-shadow: 0 1.5rem 3.5rem rgba(15, 23, 42, 0.12);
            overflow: hidden;
        }

        .register-panel {
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
        }
    </style>
</head>
<body class="d-flex align-items-center">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-10 col-xl-9">
            <div class="card register-card">
                <div class="row g-0">
                    <div class="col-lg-5 register-panel text-white p-4 p-lg-5 d-flex flex-column justify-content-between">
                        <div>
                            <span class="badge text-bg-light text-dark mb-3">Register</span>
                            <h1 class="display-6 fw-bold mb-3">Create a habit tracker account.</h1>
                            <p class="mb-0 text-white-50">Register with your username, email, and password, then sign in from the login page.</p>
                        </div>
                        <p class="small mb-0 text-white-50">Your password is stored securely with BCrypt hashing.</p>
                    </div>
                    <div class="col-lg-7 p-4 p-lg-5">
                        <div class="mb-4">
                            <h2 class="h3 mb-2">Join now</h2>
                            <p class="text-secondary mb-0">Fill out the form below to create your account.</p>
                        </div>

                        <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}">
                            Registration failed.
                        </div>

                        <form th:action="@{/register}" method="post" class="row g-3">
                            <div class="col-12">
                                <label for="username" class="form-label">Username</label>
                                <input id="username" type="text" name="username" class="form-control form-control-lg" th:value="${username}" autocomplete="username" required>
                            </div>
                            <div class="col-12">
                                <label for="email" class="form-label">Email</label>
                                <input id="email" type="email" name="email" class="form-control form-control-lg" th:value="${email}" autocomplete="email" required>
                            </div>
                            <div class="col-12">
                                <label for="password" class="form-label">Password</label>
                                <input id="password" type="password" name="password" class="form-control form-control-lg" autocomplete="new-password" required>
                            </div>
                            <div class="col-12 d-grid pt-2">
                                <button type="submit" class="btn btn-dark btn-lg">Create Account</button>
                            </div>
                        </form>

                        <div class="text-center mt-4">
                            <span class="text-secondary">Already registered?</span>
                            <a th:href="@{/login}" class="fw-semibold text-decoration-none">Go to login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
